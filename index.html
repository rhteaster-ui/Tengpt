<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tengpt • Gemini Flash 2.5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f7f8;
      --surface: #ffffff;
      --surface-2: #f0f2f4;
      --text: #101418;
      --subtext: #5f6368;
      --border: #e6e7e9;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --danger: #dc2626;
      --shadow: 0 8px 24px rgba(16, 20, 24, 0.08);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: transform .2s ease;
    }
    .sidebar.mobile-open { transform: translateX(0); }

    .sidebar-head {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      height: 38px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn.primary { background: var(--accent); color: white; border-color: transparent; }
    .btn.primary:hover { background: var(--accent-2); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .chat-list {
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 12px;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: var(--text);
    }

    .chat-item.active,
    .chat-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .chat-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-meta { font-size: 12px; color: var(--subtext); margin-top: 4px; }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      background: var(--surface);
      gap: 12px;
    }

    .brand { font-size: 15px; font-weight: 700; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .mobile-menu { display: none; }

    select, .toggle {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 10px;
      height: 36px;
      padding: 0 10px;
      font-size: 13px;
    }

    .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }

    .chat-wrap {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      justify-content: center;
    }

    .chat {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .msg.user { justify-content: flex-end; }

    .bubble {
      max-width: min(760px, 88%);
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.55;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .msg.user .bubble {
      background: #1f2937;
      color: #fff;
      border-color: #1f2937;
      box-shadow: none;
    }

    .bubble img {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-top: 10px;
    }
    .msg-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .msg-actions button {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .code {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .code-head {
      background: #111827;
      color: #cbd5e1;
      font-size: 12px;
      padding: 7px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .code pre {
      margin: 0;
      padding: 12px;
      background: #0b1020;
      color: #e2e8f0;
      overflow-x: auto;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .bubble p { margin: 0 0 10px; }
    .bubble h1, .bubble h2, .bubble h3, .bubble h4 { margin: 0 0 10px; line-height: 1.25; }
    .bubble ul { margin: 0 0 10px 18px; padding: 0; }
    .bubble li { margin: 0 0 4px; }
    .bubble code { background: rgba(148,163,184,.2); padding: 1px 5px; border-radius: 6px; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 10px 12px;
    }

    .typing span {
      width: 7px; height: 7px; border-radius: 999px; background: #8b949e;
      animation: blink 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .composer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px;
      display: flex;
      justify-content: center;
    }

    .composer-inner {
      width: 100%;
      max-width: 860px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .thumb {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    .thumb button {
      position: absolute;
      top: 3px; right: 3px;
      border: none; border-radius: 999px;
      background: rgba(0,0,0,0.7); color: white;
      width: 18px; height: 18px; font-size: 12px; cursor: pointer;
    }

    .row { display: flex; gap: 8px; align-items: flex-end; }

    textarea {
      flex: 1;
      min-height: 48px;
      max-height: 180px;
      resize: none;
      border: none;
      outline: none;
      font: inherit;
      padding: 8px;
      background: transparent;
      line-height: 1.4;
    }

    .upload { display: none; }

    .muted { font-size: 12px; color: var(--subtext); margin-top: 8px; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        display: flex;
        position: fixed;
        inset: 0 auto 0 0;
        width: min(82vw, 320px);
        z-index: 60;
        transform: translateX(-110%);
        box-shadow: var(--shadow);
      }
      .mobile-menu { display: inline-flex; }
      .chat-wrap { padding: 14px; }
      .composer { padding: 10px; }
      .bubble { max-width: 96%; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <button class="btn primary" id="newChatBtn">+ New chat</button>
      </div>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="brand">Tengpt • Gemini UI (ChatGPT style)</div>
        <div class="controls">
          <button class="btn mobile-menu" id="mobileMenuBtn">☰</button>
          <select id="modelSelect">
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          </select>
          <label class="toggle"><input type="checkbox" id="imageGenToggle" /> Image Gen</label>
          <label class="toggle"><input type="checkbox" id="imageEditToggle" /> Image Edit</label>
        </div>
      </div>

      <div class="chat-wrap">
        <div class="chat" id="chat"></div>
      </div>

      <div class="composer">
        <div class="composer-inner">
          <div class="preview" id="preview"></div>
          <div class="row">
            <label class="btn" for="fileInput">Attach</label>
            <input id="fileInput" class="upload" type="file" accept="image/*" multiple />
            <textarea id="prompt" placeholder="Tulis pesan... (Enter untuk kirim, Shift+Enter baris baru)"></textarea>
            <button class="btn primary" id="sendBtn">Send</button>
          </div>
          <div class="muted">Siap deploy Vercel. Cukup isi <code>GEMINI_API_KEY</code>.</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      chats: [],
      currentChatId: null,
      pendingImages: [],
      sending: false,
    };

    const el = {
      chat: document.getElementById('chat'),
      chatList: document.getElementById('chatList'),
      mobileMenuBtn: document.getElementById('mobileMenuBtn'),
      newChatBtn: document.getElementById('newChatBtn'),
      fileInput: document.getElementById('fileInput'),
      preview: document.getElementById('preview'),
      prompt: document.getElementById('prompt'),
      sendBtn: document.getElementById('sendBtn'),
      modelSelect: document.getElementById('modelSelect'),
      imageGenToggle: document.getElementById('imageGenToggle'),
      imageEditToggle: document.getElementById('imageEditToggle')
    };

    const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;

    function save() {
      localStorage.setItem('tengpt_state_v2', JSON.stringify({ chats: state.chats, currentChatId: state.currentChatId }));
    }

    function load() {
      const raw = localStorage.getItem('tengpt_state_v2');
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        state.chats = Array.isArray(parsed.chats) ? parsed.chats : [];
        state.currentChatId = parsed.currentChatId || null;
      } catch {}
    }

    function newChat() {
      const chat = { id: uid(), title: 'New Chat', updatedAt: Date.now(), messages: [] };
      state.chats.unshift(chat);
      state.currentChatId = chat.id;
      document.querySelector('.sidebar').classList.remove('mobile-open');
      save();
      render();
    }

    function getCurrentChat() {
      return state.chats.find(c => c.id === state.currentChatId) || null;
    }

    function escapeHtml(str = '') {
      return str.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    function renderMarkdownLite(text = '') {
      const sections = text.split('```');
      return sections.map((section, i) => {
        if (i % 2 === 0) {
          const lines = section.split('\n');
          let html = '';
          let inList = false;
          for (let line of lines) {
            const raw = escapeHtml(line);
            if (/^\s*---+\s*$/.test(line)) {
              if (inList) { html += '</ul>'; inList = false; }
              html += '<hr/>';
              continue;
            }
            const hMatch = raw.match(/^(#{1,6})\s+(.*)$/);
            if (hMatch) {
              if (inList) { html += '</ul>'; inList = false; }
              const level = hMatch[1].length;
              html += `<h${level}>${hMatch[2]}</h${level}>`;
              continue;
            }
            const li = raw.match(/^\s*[-*]\s+(.*)$/);
            if (li) {
              if (!inList) { html += '<ul>'; inList = true; }
              html += `<li>${li[1]}</li>`;
              continue;
            }
            if (inList) { html += '</ul>'; inList = false; }
            const withBold = raw
              .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
              .replace(/`([^`]+)`/g, '<code>$1</code>');
            html += withBold ? `<p>${withBold}</p>` : '<br/>';
          }
          if (inList) html += '</ul>';
          return `<div>${html}</div>`;
        }
        const lines = section.split('\n');
        const lang = escapeHtml(lines.shift() || 'code');
        const code = escapeHtml(lines.join('\n'));
        return `<div class="code"><div class="code-head">${lang}</div><pre>${code}</pre></div>`;
      }).join('');
    }

    function renderChatList() {
      el.chatList.innerHTML = state.chats.map(c => `
        <button class="chat-item ${c.id === state.currentChatId ? 'active' : ''}" data-chat-id="${c.id}">
          <div class="chat-title">${escapeHtml(c.title || 'Untitled')}</div>
          <div class="chat-meta">${new Date(c.updatedAt).toLocaleString('id-ID')}</div>
        </button>
      `).join('');

      el.chatList.querySelectorAll('.chat-item').forEach(btn => {
        btn.addEventListener('click', () => {
          state.currentChatId = btn.dataset.chatId;
          document.querySelector('.sidebar').classList.remove('mobile-open');
          save();
          render();
        });
      });
    }

    function renderPreview() {
      el.preview.innerHTML = state.pendingImages.map((img, idx) => `
        <div class="thumb">
          <img src="${img.base64}" alt="img-${idx}" />
          <button data-rm="${idx}">×</button>
        </div>
      `).join('');

      el.preview.querySelectorAll('button[data-rm]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.pendingImages.splice(Number(btn.dataset.rm), 1);
          renderPreview();
        });
      });
    }

    function renderMessages() {
      const current = getCurrentChat();
      if (!current || !current.messages.length) {
        el.chat.innerHTML = `<div class="msg"><div class="bubble">Halo! Saya siap jadi asisten Gemini yang tampilannya mirip ChatGPT. Kirim pesan, upload gambar, atau aktifkan mode Image Gen/Image Edit.</div></div>`;
        return;
      }

      el.chat.innerHTML = current.messages.map(msg => {
        if (msg.role === 'user') {
          const imgs = (msg.images || []).map(src => `<img src="${src}" alt="upload"/>`).join('');
          return `<div class="msg user"><div class="bubble">${escapeHtml(msg.text || '')}${imgs}</div></div>`;
        }

        if (msg.typing) {
          return `<div class="msg"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
        }

        const imgs = (msg.images || []).map(src => `<img src="${src}" alt="generated"/>`).join('');
        return `<div class="msg"><div class="bubble">${renderMarkdownLite(msg.text || '')}${imgs}<div class="msg-actions"><button data-copy="${msg.createdAt}">Copy</button><button data-regen="${msg.createdAt}">Regenerate</button></div></div></div>`;
      }).join('');

      el.chat.parentElement.scrollTop = el.chat.parentElement.scrollHeight;
      el.chat.querySelectorAll('[data-copy]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const t = btn.closest('.bubble')?.innerText?.replace('CopyRegenerate', '') || '';
          await navigator.clipboard.writeText(t.trim());
          btn.textContent = 'Copied';
          setTimeout(() => (btn.textContent = 'Copy'), 1100);
        });
      });
      el.chat.querySelectorAll('[data-regen]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const current = getCurrentChat();
          if (!current) return;
          const lastUser = [...current.messages].reverse().find((m) => m.role === 'user');
          if (!lastUser) return;
          el.prompt.value = lastUser.text || '';
          sendMessage();
        });
      });
    }

    function render() {
      renderChatList();
      renderPreview();
      renderMessages();
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      if (state.sending) return;
      const text = el.prompt.value.trim();
      const hasImages = state.pendingImages.length > 0;
      if (!text && !hasImages) return;
      const current = getCurrentChat();
      if (!current) return;
      if (el.imageEditToggle.checked && !hasImages) {
        current.messages.push({
          role: 'assistant',
          text: 'Untuk mode Image Edit, upload dulu minimal 1 gambar.',
          createdAt: Date.now()
        });
        render();
        return;
      }

      const userMsg = {
        role: 'user',
        text,
        images: state.pendingImages.map(i => i.base64),
        createdAt: Date.now()
      };

      current.messages.push(userMsg);
      current.updatedAt = Date.now();
      if (current.messages.length === 1) {
        current.title = text.slice(0, 40) || 'Image prompt';
      }

      const typingId = uid();
      current.messages.push({ role: 'assistant', text: '', typing: true, id: typingId, createdAt: Date.now() });

      state.sending = true;
      el.sendBtn.disabled = true;
      const payloadImages = [...state.pendingImages];
      state.pendingImages = [];
      el.prompt.value = '';
      render();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: text,
            images: payloadImages.map(i => i.base64),
            mode: el.imageGenToggle.checked ? 'image_generate' : (el.imageEditToggle.checked ? 'image_edit' : 'chat'),
            model: el.modelSelect.value,
            history: current.messages
              .filter(m => !m.typing)
              .map(m => ({ role: m.role, text: m.text, images: m.images || [] }))
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.reply || data.error || 'Request failed');

        const idx = current.messages.findIndex(m => m.id === typingId);
        const assistant = {
          role: 'assistant',
          text: data.reply || '',
          images: data.images || [],
          createdAt: Date.now()
        };

        if (idx >= 0) current.messages.splice(idx, 1, assistant);
        else current.messages.push(assistant);
      } catch (err) {
        const idx = current.messages.findIndex(m => m.id === typingId);
        const failed = { role: 'assistant', text: `❌ ${err.message}`, createdAt: Date.now() };
        if (idx >= 0) current.messages.splice(idx, 1, failed);
      } finally {
        state.sending = false;
        el.sendBtn.disabled = false;
        current.updatedAt = Date.now();
        save();
        render();
      }
    }

    el.newChatBtn.addEventListener('click', newChat);
    el.mobileMenuBtn.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.toggle('mobile-open');
    });
    el.imageGenToggle.addEventListener('change', () => {
      if (el.imageGenToggle.checked) el.imageEditToggle.checked = false;
    });
    el.imageEditToggle.addEventListener('change', () => {
      if (el.imageEditToggle.checked) el.imageGenToggle.checked = false;
    });
    el.sendBtn.addEventListener('click', sendMessage);
    el.prompt.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    el.fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []);
      for (const file of files) {
        const base64 = await fileToBase64(file);
        state.pendingImages.push({ base64, name: file.name });
      }
      e.target.value = '';
      renderPreview();
    });

    load();
    if (!state.chats.length) newChat();
    if (!state.currentChatId && state.chats.length) state.currentChatId = state.chats[0].id;
    render();
  </script>
</body>
</html>
